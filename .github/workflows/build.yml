name: build

# Builds and tests the ext-php-rs PHP extension for the tantivy-php workspace, per spec §6
# (docs/superpowers/specs/2026-07-08-tantivy-php-ext-php-rs-binding-design.md) and plan Task 9
# (docs/superpowers/plans/2026-07-08-tantivy-php-ext-php-rs-binding.md).
#
# Scope is pinned to PHP 8.4 NTS, x86_64, per the project's stated constraint (see spec §10
# no-objetivos: no ZTS, no other PHP versions, no macOS).
#
# Pipeline shape: `test` (Rust tests + clippy) and `lint` (fmt + supply-chain checks) run first
# and GATE the builds. `build-linux` / `build-windows` only run once BOTH gates are green
# (needs: [test, lint]) — no build minutes spent, and no artifacts published, on a red tree. The
# PHP smoke/PHPUnit suites need the compiled extension, so they run inside build-linux against the
# freshly built .so rather than in the pre-build test gate.
#
# The Windows ext build mirrors ext-php-rs's own upstream CI (setup-php + nightly Rust, no dev-pack
# step, default MSVC linker). It stays `continue-on-error` until it has gone green here once.

on:
  push:
  pull_request:
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Rust tests + clippy (stable, PHP 8.4 NTS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # php-config / dev headers are needed even for `cargo test`: compiling tantivy-ext links
      # against PHP internals via ext-php-rs, so the toolchain must find them.
      - name: Install PHP 8.4 NTS + dev headers
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: none
          extensions: none

      - name: Assert PHP build is NTS (project is pinned to 8.4 NTS only)
        run: php -v | grep -q 'NTS' || { echo "::error::expected an NTS PHP build, got:"; php -v; exit 1; }

      - name: Install clang (needed by ext-php-rs's bindgen step)
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install Rust stable (+ clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          clang --version
          php -v
          php-config --version

      - name: cargo test (tantivy-core + tantivy-ext)
        run: cargo test

      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets -- -D warnings

  lint:
    name: Lint & security (rustfmt, audit, deny, machete)
    runs-on: ubuntu-latest
    # Lightweight: fmt reads source, audit/deny read Cargo.lock, machete parses manifests — none
    # need clang or a full build (clippy runs in the `test` job against a real compile).
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable (+ rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all --check

      # Prebuilt binaries (fast) instead of `cargo install` from source.
      - name: Install cargo-audit, cargo-deny, cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny,cargo-machete

      # RUSTSEC advisories over the dependency tree. cargo-deny (below) also checks advisories, but
      # cargo-audit is kept as a lighter, advisory-only signal per the project's tooling choice.
      #
      # RUSTSEC-2026-0002 (lru IterMut unsoundness) is IGNORED deliberately: lru is pulled only
      # transitively by tantivy 0.25, which pins `lru = "^0.12"` and thus caps it below the patched
      # 0.16.3 — the fix is unreachable without tantivy relaxing its constraint upstream. It's an
      # unsound-only advisory (no known exploit; effectively Miri-only), not a vulnerability. Remove
      # this ignore once tantivy ships a release that bumps lru to >= 0.16.3.
      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2026-0002

      # Advisories + license policy + source policy + dependency bans. Config: deny.toml.
      - name: cargo deny
        run: cargo deny check

      - name: cargo machete (unused dependencies)
        run: cargo machete

  php-lint:
    name: PHP static analysis (PHPStan level 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install PHP 8.4 + PHPStan
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: phpstan
          # PHPStan needs ctype/tokenizer (shared, not compiled into the runner's PHP). The native
          # ext is NOT loaded — Tantivy\Native\Index is stubbed for analysis (php/phpstan/).
          extensions: ctype, tokenizer

      - name: phpstan analyse
        run: phpstan analyse -c php/phpstan.neon

  coverage:
    name: Coverage (tantivy-core, informational)
    runs-on: ubuntu-latest
    # Informational only: never blocks the pipeline, and NOT in the builds' `needs`. tantivy-core has
    # no PHP/ext-php-rs dependency, so this job needs neither clang nor PHP — just Rust + the tantivy
    # deps. Scoped to `-p tantivy-core` on purpose: tantivy-ext's #[php] methods are exercised by the
    # PHP smoke/PHPUnit suites, not by Rust tests, so measuring them here would undercount.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable (+ llvm-tools-preview)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Measure coverage and write it to the job summary
        run: |
          cargo llvm-cov -p tantivy-core --summary-only | tee coverage.txt
          {
            echo '### tantivy-core coverage'
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  build-linux:
    name: Build + integration (Linux, PHP 8.4 NTS)
    runs-on: ubuntu-latest
    # Only build once the Rust tests AND the lint/security/PHP-analysis gates are green.
    needs: [test, lint, php-lint]
    steps:
      - uses: actions/checkout@v5

      - name: Install PHP 8.4 NTS + dev headers
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: phpunit
          # PHPUnit needs these shared extensions (ctype/tokenizer are not compiled into the runner's
          # PHP; the rest it requires — dom/mbstring/xmlwriter/... — are). The tantivy ext itself is
          # NOT installed here: it is loaded per-command via -d extension= (it is the class under test).
          extensions: ctype, tokenizer

      - name: Assert PHP build is NTS (project is pinned to 8.4 NTS only)
        run: php -v | grep -q 'NTS' || { echo "::error::expected an NTS PHP build, got:"; php -v; exit 1; }

      - name: Install clang (needed by ext-php-rs's bindgen step)
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Builds crates/tantivy-ext (libtantivyphp_ext.so) from the workspace root. On this Linux
      # setup (stable Rust + clang present), no special env vars (LIBCLANG_PATH /
      # BINDGEN_EXTRA_CLANG_ARGS) are needed — see progress notes in
      # docs/superpowers/sdd/progress.md for the historical libclang-only fallback.
      - name: cargo build --release
        run: cargo build --release

      - name: Smoke test — ext backend (extension=, no ffi.enable needed)
        run: php -d extension="${{ github.workspace }}/target/release/libtantivyphp_ext.so" php/tests/smoke.php

      # PHPUnit suite (php/tests/*Test.php) with the freshly built extension loaded. Unlike the
      # smoke script this exercises the userland facade (Client/ExtClient) through the real test
      # harness. The ext .so must be loaded via -d extension= (it is the class under test).
      - name: PHPUnit — ext backend
        run: php -d extension="${{ github.workspace }}/target/release/libtantivyphp_ext.so" "$(which phpunit)" -c php/phpunit.xml

      # Package the Linux ext artifact: the ext cdylib renamed to tantivyphp.so so it drops
      # straight into extension_dir per the install guide.
      - name: Stage Linux artifacts
        run: |
          mkdir -p dist/linux
          cp target/release/libtantivyphp_ext.so dist/linux/tantivyphp.so

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tantivyphp-linux-x64-php84nts
          path: dist/linux/*
          if-no-files-found: error

  build-windows:
    name: Build (Windows, nightly Rust, MSVC, PHP 8.4 NTS) — spike [gated]
    runs-on: windows-latest
    # Only after the Rust tests + lint gates pass. Recipe mirrors ext-php-rs's own upstream Windows
    # CI. Kept `continue-on-error: true` only until this job has gone green here at least once — a
    # Windows-ext failure then never blocks the pipeline. Flip to false once green.
    needs: [test, lint, php-lint]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Install PHP 8.4 NTS
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: none
          extensions: none

      - name: Install Rust nightly (MSVC, x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc

      # CRITICAL for a *distributable* .dll: Windows PHP refuses to load an extension built with a
      # NEWER MSVC toolset than the PHP core ("Can't load module ... linked with 14.51, but the core
      # is linked with 14.44"). The runner's default MSVC drifts ahead of the toolset windows.php.net
      # uses to build PHP, so we PIN the toolset to match the target PHP. `14.44` matches the current
      # windows.php.net PHP 8.4 build (the one bundled with Service Desk). To confirm/adjust: run
      # `php -i | findstr Compiler` on the target PHP — the extension toolset must be <= the core's.
      # If the runner image doesn't ship 14.44, add a VS-installer step to install that VC component.
      - name: Pin MSVC toolset to match target PHP (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: '14.44'

      - name: Show toolchain versions
        shell: pwsh
        run: |
          rustc +nightly --version
          cargo --version
          cl 2>&1 | Select-Object -First 1
          php -v
          php -i | Select-String -SimpleMatch 'Compiler'

      # ext-php-rs on Windows requires nightly for the vectorcall calling convention used to call
      # back into PHP internals. Do NOT drop the `+nightly` here — see Task 8 notes for what a
      # stable-toolchain attempt is expected to fail with. The build uses the MSVC toolset pinned
      # above (msvc-dev-cmd sets PATH/LIB/INCLUDE for this job), so the .dll links against 14.44.
      - name: Build tantivy-ext (nightly, release)
        shell: pwsh
        run: cargo +nightly build --release -p tantivy-ext

      - name: Smoke — extension loads and exposes Tantivy\Native\Index
        shell: pwsh
        run: |
          php -d extension="${{ github.workspace }}\target\release\tantivyphp_ext.dll" -m
          php -d extension="${{ github.workspace }}\target\release\tantivyphp_ext.dll" -r "var_dump(class_exists('Tantivy\Native\Index'));"

      # Stages the Windows ext .dll artifact.
      - name: Stage Windows ext artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Copy-Item target\release\tantivyphp_ext.dll dist\windows\tantivyphp_ext.dll

      - name: Upload Windows ext artifact
        uses: actions/upload-artifact@v4
        with:
          name: tantivyphp-ext-windows-x64-php84nts
          path: dist/windows/*
          if-no-files-found: error
