name: build

# Builds and tests both PHP bindings (FFI cdylib + ext-php-rs extension) for the tantivy-php
# workspace, per spec §6 (docs/superpowers/specs/2026-07-08-tantivy-php-ext-php-rs-binding-design.md)
# and plan Task 9 (docs/superpowers/plans/2026-07-08-tantivy-php-ext-php-rs-binding.md).
#
# Scope is pinned to PHP 8.4 NTS, x86_64, per the project's stated constraint (see spec §10
# no-objetivos: no ZTS, no other PHP versions, no macOS).
#
# NOTE (2026-07-08): this file has never been executed by a CI runner — this repo has no git
# remote configured in the environment it was authored in. It has only been checked for being
# well-formed YAML (see docs/superpowers/notes/2026-07-08-windows-ext-build-spike.md and the
# Task 8/9 report for the validation command + output). Treat first real execution on GitHub's
# runners as the actual verification of this workflow, especially the Windows job (see below).

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux (stable Rust, PHP 8.4 NTS) — build + test + both backend smokes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP 8.4 NTS + dev headers
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # NTS (no thread-safety) is this action's Linux default; the ext extension is built
          # against whichever ABI php-config reports, so we assert NTS explicitly below rather
          # than trust the default silently.
          tools: none
          extensions: none
          ini-values: ffi.enable=1

      - name: Assert PHP build is NTS (project is pinned to 8.4 NTS only)
        run: php -v | grep -q 'NTS' || { echo "::error::expected an NTS PHP build, got:"; php -v; exit 1; }

      - name: Install clang (needed by ext-php-rs's bindgen step)
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          clang --version
          php -v
          php-config --version

      # Builds crates/tantivy-ffi (libtantivyphp.so) and crates/tantivy-ext (libtantivyphp_ext.so)
      # from the workspace root in one pass. On this Linux setup (stable Rust + clang present),
      # no special env vars (LIBCLANG_PATH / BINDGEN_EXTRA_CLANG_ARGS) are needed — see progress
      # notes in docs/superpowers/sdd/progress.md for the historical libclang-only fallback.
      - name: cargo build --release (builds both cdylibs)
        run: cargo build --release

      - name: cargo test (tantivy-core + tantivy-ffi roundtrip)
        run: cargo test

      - name: cargo clippy -D warnings
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Smoke test — FFI backend (ffi.enable, TANTIVYPHP_LIB)
        env:
          TANTIVYPHP_LIB: ${{ github.workspace }}/target/release/libtantivyphp.so
        run: php -d ffi.enable=1 php/tests/smoke.php

      - name: Smoke test — ext backend (extension=, no ffi.enable needed)
        run: php -d extension="${{ github.workspace }}/target/release/libtantivyphp_ext.so" php/tests/smoke.php

      # Package the Linux half of the 4-artifact matrix (spec §6): FFI cdylib as-is, ext cdylib
      # renamed to tantivyphp.so so it drops straight into extension_dir per the install guide.
      - name: Stage Linux artifacts
        run: |
          mkdir -p dist/linux
          cp target/release/libtantivyphp.so dist/linux/libtantivyphp.so
          cp target/release/libtantivyphp_ext.so dist/linux/tantivyphp.so

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tantivyphp-linux-x64-php84nts
          path: dist/linux/*
          if-no-files-found: error

  windows:
    name: Windows (nightly Rust, MSVC, PHP 8.4 NTS) — ext build spike [gated]
    runs-on: windows-latest
    # GATED: Task 8 (docs/superpowers/notes/2026-07-08-windows-ext-build-spike.md) documents the
    # confirmed *requirements* for a Windows tantivy-ext build (nightly for vectorcall, MSVC,
    # PHP 8.4 NTS dev pack) but could not execute an actual build/load — there is no Windows box
    # in that environment. This job's first real run on GitHub's windows-latest runner IS that
    # spike's first live execution. Keep `continue-on-error: true` so a Windows-ext failure never
    # blocks the pipeline; the FFI cdylib already covers Windows customers who can enable
    # ffi.enable=1. Flip this to false (and update the notes doc's status to GO) only after this
    # job has gone green reliably.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP 8.4 NTS
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: none
          extensions: none

      - name: Install Rust nightly (MSVC, x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc

      - name: Show toolchain versions
        shell: pwsh
        run: |
          rustc +nightly --version
          cargo --version
          php -v

      # ext-php-rs on Windows requires nightly for the vectorcall calling convention used to call
      # back into PHP internals. Do NOT drop the `+nightly` here — see Task 8 notes for what a
      # stable-toolchain attempt is expected to fail with.
      - name: Build tantivy-ext (nightly, release)
        shell: pwsh
        run: cargo +nightly build --release -p tantivy-ext

      - name: Smoke — extension loads and exposes Tantivy\Native\Index
        shell: pwsh
        run: |
          php -d extension="${{ github.workspace }}\target\release\tantivyphp_ext.dll" -m
          php -d extension="${{ github.workspace }}\target\release\tantivyphp_ext.dll" -r "var_dump(class_exists('Tantivy\Native\Index'));"

      # Windows half of the 4-artifact matrix (spec §6). NOTE: this only stages the ext .dll.
      # The FFI Windows artifact (tantivyphp.dll, "existing path" per spec §6) is not built by
      # this workflow yet — it was previously flagged (docs/superpowers/sdd/progress.md, "Carried
      # items") as not verified in any environment and is tracked separately, not part of this
      # ext-focused spike/CI task.
      - name: Stage Windows ext artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Copy-Item target\release\tantivyphp_ext.dll dist\windows\tantivyphp_ext.dll

      - name: Upload Windows ext artifact
        uses: actions/upload-artifact@v4
        with:
          name: tantivyphp-ext-windows-x64-php84nts
          path: dist/windows/*
          if-no-files-found: error
